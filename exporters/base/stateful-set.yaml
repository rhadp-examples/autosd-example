apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: basic-exporter
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  serviceName: basic-exporter
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: basic-exporter
  template:
    metadata:
      labels:
        app: basic-exporter
    annotations:
        openshift.io/required-scc: privileged
    spec:
      #tolerations:
      #- key: "metal"
      #  operator: "Equal"
      #  value: "true"
      #  effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: auto.node-role/builder
                operator: In
                values:
                - "true"
      serviceAccountName: basic-exporter
      restartPolicy: Always
      volumes:
        - name: registry-ca
          configMap:
            name: registry-service-ca

      initContainers:
        - name: jumpstarter-init
          image: ghcr.io/rhadp/runtime:latest
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /shared
              name: shared
          command:
            - /bin/bash
            - -c
            - |
              set -eo pipefail

              # Extract the values from the service account
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              API_SERVER=$(oc whoami --show-server)

              # set ./kube/config correctly
              mkdir -p ~/.kube

              oc config set-cluster rhas \
                --server=$API_SERVER \
                --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              oc config set-credentials basic-exporter-sa \
                --token=$TOKEN

              oc config set-context basic-exporter-ctx \
                --cluster=rhas \
                --user=basic-exporter-sa \
                --namespace=$NAMESPACE

              oc config use-context basic-exporter-ctx

              # check if exporter already exists and delete it if so ...

              EXPORTER_NAME=$(cat /etc/hostname)
              if oc get exporter "$EXPORTER_NAME" -n $NAMESPACE &>/dev/null; then
                echo "Exporter '$EXPORTER_NAME' already exists, deleting it now ..."
                oc delete exporter "$EXPORTER_NAME" -n $NAMESPACE || true
              fi

      containers:
        - name: jumpstarter-exporter
          image: ghcr.io/rhadp/runtime:latest
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 2.0
              memory: "4G"
            requests:
              cpu: 1.0
              memory: "2G"
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /etc/pki/ca-trust/source/anchors/service-ca-bundle.crt
              name: registry-ca
              subPath: service-ca-bundle.crt
              readOnly: true
          env:
            - name: JUMPSTARTER_GRPC_INSECURE
              value: "1"
            - name: OCI_USERNAME
              value: "serviceaccount"
            - name: OCI_PASSWORD_FILE
              value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
          command:
            - /bin/bash
            - -c
            - |
              set -eo pipefail

              source /venv/bin/activate

              # update to latest jumpstarter version
              uv pip install --reinstall "git+https://github.com/mickume/jumpstarter@main#subdirectory=python/packages/jumpstarter-all"

              # Trust the internal registry's service-serving CA
              if [ -f /etc/pki/ca-trust/source/anchors/service-ca-bundle.crt ]; then
                  update-ca-trust
              fi

              # Extract the values from the service account
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              API_SERVER=$(oc whoami --show-server)

              # set ./kube/config correctly
              mkdir -p ~/.kube

              oc config set-cluster rhadp \
                --server=$API_SERVER \
                --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              oc config set-credentials basic-exporter-sa \
                --token=$TOKEN

              oc config set-context basic-exporter-ctx \
                --cluster=rhadp \
                --user=basic-exporter-sa \
                --namespace=$NAMESPACE

              oc config use-context basic-exporter-ctx

              # create the exporter config
              EXPORTER_NAME=$(cat /etc/hostname)
              
              jmp admin create exporter "$EXPORTER_NAME" -n $NAMESPACE --label platform=arm --label type=test --save --insecure-tls --nointeractive --out ./dummy.yaml
              TOKEN=$(yq '.token' dummy.yaml)
              echo "$TOKEN" > /shared/token

              # remove the exporter config
              rm ./dummy.yaml

              # detect the endpoint
              while [ -z "$ENDPOINT" ]
              do
                ENDPOINT=$(kubectl get -n $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace) \
                  exporters.jumpstarter.dev $(cat /etc/hostname) -o jsonpath="{.status.endpoint}")
                sleep 1s
              done
              echo "$ENDPOINT" > /shared/endpoint

              # NOTE: Do NOT export OCI_PASSWORD here. The OCI_PASSWORD_FILE env var
              # tells the QEMU driver to read the SA token fresh from disk on every
              # flash, so credentials survive kubelet token rotation.

              cat <<EOF > basic-exporter.yaml
              apiVersion: jumpstarter.dev/v1alpha1
              kind: ExporterConfig
              metadata:
                namespace: $(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
                name: $(cat /etc/hostname)
              endpoint: $(cat /shared/endpoint)
              tls:
                ca: ''
                insecure: true
              token: $(cat /shared/token)
              export:
                power:
                  type: jumpstarter_driver_power.driver.MockPower
              EOF

              sleep 60s

              echo "Starting the exporter ..."

              jmp run --exporter-config basic-exporter.yaml

              #while true; do
              #  sleep 30s
              #done
