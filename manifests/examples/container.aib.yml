# Example installing and use a container as a service

name: simple-container

content:
  # The container service depends on vsomeip3-routingmanager from this repo
  repos:
    - id: copr-sample-apps
      baseurl: https://download.copr.fedorainfracloud.org/results/alexl/cs9-sample-images/centos-stream-9-$arch/
  rpms:
    - curl
    - auto-app
    - vsomeip3-routingmanager
  container_images:
    - source: registry.gitlab.com/centos/automotive/sample-images/demo/auto-app
      tag: latest
      name: localhost/auto-app
  add_files:
    - path: /etc/containers/systemd/radio.container
      source_path: ../files/radio.container
    - path: /etc/containers/systemd/engine.container
      source_path: ../files/engine.container

